[build-system]
requires = ["flit_core>=3.4,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "slurm-flow"
dynamic = ["version"]
description = "Decorator-based Slurm DAG engine with auto-generated CLI, cancel, retry, and status tracking"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "SQLAlchemy>=2.0",
]
license = {file = "LICENSE"}
authors = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]
maintainers = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]

[project.optional-dependencies]
postgresql = [
  "psycopg[binary]>=3.1",
]
mariadb = [
  "mariadb>=1.1",
]
dev = [
  "pytest>=7",
  "pytest-cov",
  "ruff",
  "mypy",
]

[tool.setuptools.packages.find]
include = ["slurm_flow*"]

[tool.ruff]
line-length = 99
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

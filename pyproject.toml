[build-system]
requires = ["flit_core>=3.4,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "reflow"
dynamic = ["version"]
description = "Decorator-based HPC workflow engine with Result-based data wiring, reusable Flows, and an auto-generated CLI"
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]
maintainers = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]
dependencies = [
    "tomli>=1.0; python_version < '3.11'",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: System :: Distributed Computing",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/FREVA-CLINT/reflow"
Documentation = "https://reflow.readthedocs.io"
Repository = "https://github.com/FREVA-CLINT/reflow"
Issues = "https://github.com/FREVA-CLINT/reflow/issues"

[project.scripts]
reflow = "reflow.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-cov",
    "ruff",
    "mypy",
]

[tool.flit.module]
name = "reflow"

[tool.ruff]
line-length = 99
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

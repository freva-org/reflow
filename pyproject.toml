[build-system]
requires = ["flit_core>=3.4,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "reflow-hpc"
dynamic = ["version"]
description = "Decorator-based HPC workflow engine with Result-based data wiring, reusable Flows, and an auto-generated CLI"
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]
maintainers = [
    {name = "DKRZ", email = "freva@dkrz.de"},
]
dependencies = [
    "tomli>=1.0; python_version < '3.11'",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering",
    "Topic :: System :: Distributed Computing",
    "Topic :: System :: Clustering",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/freva-org/reflow"
Documentation = "https://www.reflow-docs.org"
Repository = "https://github.com/freva-org/reflow"
Issues = "https://github.com/freva-org/reflow/issues"

[project.scripts]
reflow = "reflow.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-cov",
    "ruff",
    "mypy",
]
pretty = ["rich-argparse"]
docs = [
    "mkdocs>=1.5",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "pymdown-extensions>=10.0",
    "mike",

]

[tool.flit.module]
name = "reflow"

[tool.ruff]
line-length = 88
target-version = "py310"


[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "D"]
ignore = ["D105", "D107", "D102"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
strict = true
warn_unused_ignores = true
warn_unreachable = true
show_error_codes = true
install_types = true
non_interactive = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
warn_redundant_casts = true
ignore_missing_imports = true
allow_untyped_calls = true

[tool.ty.src]
include = ["src"]

[tool.ty.environment]
root = ["./src"]

[tool.ty.rules]
all = "error"
unused-ignore-comment = "error"
unused-type-ignore-comment = "error"
redundant-cast = "warn"

[tool.ty.terminal]
error-on-warning = true


[tool.tox]
legacy_tox_ini = """

[tox]
min_version = 4.0
env_list = docs, types, lint
[testenv]
passenv = *
parallel_show_output = false

[testenv:lint]
description = "Check code quality."
deps = ruff
       flake8
       codespell
       bandit[toml]

commands =
    python3 -m ruff check src/reflow/
    python3 -m flake8 src --count --max-complexity=20 --ignore=W503,E203 --max-line-length=110 --statistics --show-source
    codespell {posargs: --quiet-level=2} src/
    python3 -m bandit -r src/reflow --severity-level medium --confidence-level high
[testenv:test]
setenv =
    VIRTUALENV_SYSTEM_SITE_PACKAGES=true
description = "Run the unit tests."
deps = -e .[dev]
commands =
    python3 -m pytest -vv --cov=reflow --cov-report=html:coverage_report --junitxml report.xml --cov-report xml tests/
    python3 -m coverage report --fail-under=65 --precision=2
[testenv:types]
description = "Static type checking."
deps = mypy
commands = python3 -m mypy --install-types --non-interactive src/reflow

[testenv:docs]
description = Build the documentation with mkdocs
deps = codespell
       .[docs]
commands =
    codespell {posargs: --quiet-level=2} docs
    mkdocs build --strict {posargs}

[testenv:docs-serve]
description = Serve the documentation locally for preview
deps = .[docs]
commands =
    mkdocs serve {posargs}
[testenv:release]
description = "Bump a new version."
deps = git-python
       packaging
       requests
       tomli
commands = python3 bump.py tag reflow
allowlist_externals = rm
                      curl
commands_pre = curl -H 'Cache-Control: no-cache' -Ls -o bump.py https://raw.githubusercontent.com/freva-org/freva-admin/main/release.py
commands_post = rm bump.py
"""

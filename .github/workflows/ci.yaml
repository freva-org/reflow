name: CI

permissions:
  contents: read
  pull-requests: write

on: [push, pull_request, workflow_call]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Install tox
        run: python -m pip install tox flit

      - name: Run linters
        run: tox -e lint

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tox
        run: python -m pip install tox flit

      - name: Run type checker
        run: tox -e types

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Install tox
        run: python -m pip install tox flit

      - name: Build docs (strict)
        run: tox -e docs

  tests:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
           python-version: ${{matrix.python-version}}

      - name: Install tox
        run: python -m pip install tox flit

      - name: Run tests
        run: tox -e test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
